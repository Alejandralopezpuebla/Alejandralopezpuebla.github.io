<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .message {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 1rem 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            font-size: 1.2rem;
            color: #333;
        }
        .lang-select {
            position: absolute;
            top: 2rem;
            right: 2rem;
        }
    </style>
</head>
<body>
    <div class="lang-select">
        <select id="lang" onchange="changeLang()">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="mp">Mapuzungun</option>
        </select>
    </div>
    <div class="message" id="msg">Esta página está en construcción.</div>
</body>
    <script>
        const messages = {
            es: "Esta página está en construcción.",
            en: "This site is under construction.",
            ar: "هذا الموقع تحت الإنشاء.",
            mp: "Tañi ruka kimün mew müley."
        };
        function changeLang() {
            const lang = document.getElementById('lang').value;
            document.getElementById('msg').textContent = messages[lang];
        }
    </script>
</body>
</body>
</html>
