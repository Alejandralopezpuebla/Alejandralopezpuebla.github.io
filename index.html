<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En desconstrucción</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .message {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            padding: 1rem 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            font-size: 1.2rem;
            color: #333;
        }
        .lang-select {
            position: absolute;
            top: 2rem;
            right: 2rem;
        }
        .bottom-menu {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background: #fff;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 0.5rem 0;
            z-index: 10;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            bottom: 2rem;
            left: 0;
            background: #fff;
            min-width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-radius: 8px;
            padding: 1rem;
            z-index: 20;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .dropdown-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #333;
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <div class="lang-select">
        <select id="lang" onchange="changeLang()">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="mp">Mapuzungun</option>
        </select>
    </div>
    <div class="message" id="msg">
        <span style="vertical-align:middle; margin-right:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="5" fill="#FFD600"/>
                <g stroke="#FFD600" stroke-width="2">
                    <line x1="12" y1="2" x2="12" y2="6" />
                    <line x1="12" y1="18" x2="12" y2="22" />
                    <line x1="2" y1="12" x2="6" y2="12" />
                    <line x1="18" y1="12" x2="22" y2="12" />
                    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
                    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
                    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
                    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
                </g>
            </svg>
        </span>
        <span id="msg-text">Esta página está en desconstrucción.</span>
    </div>
    <div class="bottom-menu">
        <div class="dropdown">
            <button class="dropdown-btn">Sobre Alejandra Lopez Puebla</button>
            <div class="dropdown-content">
                <p>Información sobre Alejandra Lopez Puebla.</p>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropdown-btn">Trabajos</button>
            <div class="dropdown-content">
                <p>Lista de trabajos o proyectos.</p>
            </div>
        </div>
    </div>
    <script>
        const messages = {
            es: "Esta página está en desconstrucción.",
            en: "This site is under deconstruction.",
            ar: "هذا الموقع تحت التفكيك.",
            mp: "Tañi ruka kimün mew müley."
        };
        function changeLang() {
            const lang = document.getElementById('lang').value;
            document.getElementById('msg-text').textContent = messages[lang];
        }
    </script>
</body>
</html>
